<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel Administrador</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
    background:#f4f6f9;
}

.panel{
    max-width:420px;
    margin:80px auto;
    padding:30px;
    background:white;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

button{
    width:100%;
}

.seccion{
    margin-bottom:25px;
}
</style>

</head>

<body>

<div class="panel">

<h4 class="text-center mb-4">Panel de Tecnino de igualdad</h4>

<div class="seccion">
<h6 class="text-center mb-2">Subir registro retributivo</h6>
<label for="formFileMultiple" class="form-label">Subida en formato Excel</label>
<input class="form-control mb-2" type="file" id="formFileMultiple">
<button class="btn btn-success">Subir archivo</button>
</div>

<div>
    //////Grafico autogenerado con los porcentajes//////
</div>

<div class="seccion">
<h6 class="text-center mb-2">Contratar</h6>
<button type="button" class="btn btn-primary">Contratar</button>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
